<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証中... - 手にビじゃん</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tenibi/tenibijan/main/fabi.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0b1520;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    color: #c9a84c;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #1a3a2a;
    border-top-color: #c9a84c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 0.9rem; color: #5a7a6a; letter-spacing: 0.1em; }
  .error { color: #e05a5a; font-size: 0.85rem; margin-top: 12px; }
</style>
</head>
<body>
  <div class="spinner"></div>
  <p id="status">認証処理中...</p>
  <p class="error" id="error"></p>

<script>
  const BACKEND = "https://tenibijan.duckdns.org";
  const GAME_URL = "/tenibijan/tenibijan.html";

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code  = params.get("code");
    const state = params.get("state");

    if (!state) {
      showError("stateパラメータがありません");
      return;
    }

    const provider = state.startsWith("twitch") ? "twitch" : "google";

    if (!code) {
      showError("認証コードがありません");
      return;
    }

    try {
      document.getElementById("status").textContent = "サーバーに接続中...";

      const res = await fetch(`${BACKEND}/auth/${provider}/exchange`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, state }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `サーバーエラー (${res.status})`);
      }

      const data = await res.json();

      if (provider === "google") {
        localStorage.setItem("jwt_token", data.token);
        localStorage.setItem("user_name", data.name || "");
        localStorage.setItem("user_photo", data.photo || "");

        document.getElementById("status").textContent = "ログイン成功！ゲームに移動します...";
        setTimeout(() => {
          window.location.href = GAME_URL;
        }, 800);

      } else if (provider === "twitch") {
        document.getElementById("status").textContent = "Twitch連携完了！ゲームに戻ります...";
        setTimeout(() => {
          window.location.href = GAME_URL + "?twitch=linked";
        }, 800);
      }

    } catch (err) {
      showError(err.message);
    }
  }

  function showError(msg) {
    document.getElementById("status").textContent = "認証に失敗しました";
    document.getElementById("error").textContent = msg;
    setTimeout(() => {
      window.location.href = GAME_URL + "?error=1";
    }, 3000);
  }

  handleCallback();
</script>
</body>
</html>
